repos:
  # === PRE-COMMIT STAGE (quick checks on every commit) ===
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files

  # === COMMIT-MSG: enforce Conventional Commits ===
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  # === PRE-PUSH STAGE (full test suite + link check before pushing) ===
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  # Link check (excludes/accept-codes live in lychee.toml, auto-discovered).
  - repo: https://github.com/lycheeverse/lychee
    rev: lychee-v0.24.2
    hooks:
      - id: lychee
        args: ["--no-progress", "--cache", "--max-cache-age", "1d", "."]
        pass_filenames: false
        stages: [pre-push]
