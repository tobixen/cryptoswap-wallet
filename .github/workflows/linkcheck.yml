name: Link check

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "03 22 * * *"

concurrency:
  group: linkcheck-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v5
      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.run_id }}
          restore-keys: cache-lychee-
      - name: Check links with Lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          fail: false
          args: >-
            --timeout 30
            --max-retries 6
            --retry-wait-time 2
            --cache
            --max-cache-age 14d
            .
      # Issue management runs only on the default branch; PR/cron runs just leave
      # the lychee result in the job log. A dedicated `link-checker` label (not a
      # generic one) keeps this from touching human-filed issues.
      - name: Open or update the Link Checker issue
        if: steps.lychee.outputs.exit_code != 0 && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # gh doesn't auto-create labels; --force makes this idempotent.
          gh label create link-checker --color FBCA04 \
            --description "Automated link-checker report" --force
          # Canonical = oldest issue with the label in ANY state, so a recovered-
          # then-broken cycle reopens the original instead of spawning a new one.
          CANON=$(gh issue list --label link-checker --state all --json number \
            --jq '.[].number' | sort -n | head -1)
          if [ -n "$CANON" ]; then
            gh issue reopen "$CANON" || true   # no-op if already open
            gh issue edit "$CANON" --body-file ./lychee/out.md
            for n in $(gh issue list --label link-checker --state open --json number \
              --jq '.[].number' | grep -vx "$CANON" || true); do
              gh issue close "$n" --comment "Duplicate of #${CANON} - auto-closed by the link checker."
            done
          else
            gh issue create --title "Link Checker Report" \
              --body-file ./lychee/out.md --label link-checker
          fi
      - name: Close the Link Checker issue when links are healthy
        if: steps.lychee.outputs.exit_code == 0 && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for n in $(gh issue list --label link-checker --state open --json number --jq '.[].number'); do
            gh issue close "$n" --comment "All links are now healthy."
          done
